<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Session Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: 'Courier New', monospace;
  background: #0d0d1a;
  color: #fff;
  overflow: hidden;
  user-select: none;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.6s ease;
}

/* ── Colour themes ── */
.theme-ready    { background: #0d0d1a; }
.theme-easy     { background: #0a2a0a; }
.theme-steady   { background: #0a1a2a; }
.theme-tempo    { background: #2a1a00; }
.theme-hard     { background: #2a0a0a; }
.theme-recover  { background: #0a2a0a; }
.theme-trans    { background: #1a1a2a; }
.theme-done     { background: #0a2a0a; }

/* ── Header bar ── */
#header {
  padding: 16px 20px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
#session-title { font-size: 13px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
#total-timer   { font-size: 13px; opacity: 0.5; font-variant-numeric: tabular-nums; }

#hr-btn {
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.5px;
}
#hr-btn.connected { color: #e63946; opacity: 1; }

/* ── Main content ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  text-align: center;
}

/* ── Ready screen ── */
#ready-screen { width: 100%; }
#ready-title  { font-size: 26px; font-weight: bold; margin-bottom: 6px; letter-spacing: 1px; }
#ready-sub    { font-size: 13px; opacity: 0.5; margin-bottom: 32px; }

.segment-preview {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border-bottom: 3px solid;
  text-align: left;
}
.seg-num  { font-size: 11px; opacity: 0.4; margin-bottom: 2px; }
.seg-name { font-size: 15px; font-weight: bold; }
.seg-pace { font-size: 12px; opacity: 0.6; margin-top: 2px; }
.seg-right { text-align: right; }
.seg-dur  { font-size: 20px; font-weight: bold; }
.seg-unit { font-size: 11px; opacity: 0.5; }

#start-btn {
  margin-top: 32px;
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 14px;
  background: #e63946;
  color: #fff;
  font-size: 17px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
#start-btn:active { transform: scale(0.97); opacity: 0.85; }

/* ── Active screen ── */
#active-screen { width: 100%; display: none; }

#seg-counter {
  font-size: 12px;
  opacity: 0.45;
  letter-spacing: 2px;
  margin-bottom: 12px;
}
#rep-counter {
  font-size: 13px;
  opacity: 0.6;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
#seg-name-big {
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 3px;
  margin-bottom: 20px;
  text-transform: uppercase;
}
#pace-display {
  font-size: 64px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 6px;
}
#pace-unit {
  font-size: 14px;
  opacity: 0.5;
  margin-bottom: 28px;
  letter-spacing: 1px;
}

/* Progress bar */
#progress-wrap {
  width: 100%;
  margin-bottom: 10px;
}
#progress-bar-bg {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: rgba(255,255,255,0.7);
  transition: width 0.5s linear;
  width: 0%;
}
#progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  opacity: 0.5;
  margin-top: 6px;
}

/* Segment timer */
#seg-timer {
  font-size: 52px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  margin: 20px 0 8px;
}
#effort-cue {
  font-size: 13px;
  opacity: 0.6;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

/* Next button */
#next-btn {
  width: 100%;
  padding: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 14px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 15px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
}
#next-btn:active { background: rgba(255,255,255,0.15); }

/* Mini controls — pause and restart */
#mini-controls {
  display: flex;
  gap: 20px;
  margin-top: 8px;
  width: 100%;
  justify-content: center;
}
.mini-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,0.38);
  font-size: 11px;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  cursor: pointer;
  transition: color 0.15s;
}
.mini-btn:active { color: rgba(255,255,255,0.75); }

/* ── Transition screen ── */
#trans-screen {
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
}
#trans-label   { font-size: 13px; opacity: 0.5; letter-spacing: 3px; margin-bottom: 16px; }
#trans-name    { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
#trans-pace    { font-size: 18px; opacity: 0.7; margin-bottom: 32px; }
#trans-count   { font-size: 80px; font-weight: bold; font-variant-numeric: tabular-nums; }

/* ── Done screen ── */
#done-screen {
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
}
#done-tick    { font-size: 56px; margin-bottom: 16px; }
#done-title   { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin-bottom: 32px; }
.done-stat    { margin-bottom: 16px; }
.done-stat-v  { font-size: 40px; font-weight: bold; font-variant-numeric: tabular-nums; }
.done-stat-l  { font-size: 12px; opacity: 0.5; letter-spacing: 2px; margin-top: 2px; }
#done-log     {
  margin-top: 32px;
  padding: 14px 28px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
  opacity: 0.7;
  letter-spacing: 1px;
}

/* ── Bottom footer ── */
#footer {
  padding: 12px 20px 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: 11px;
  opacity: 0.25;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="app" class="theme-ready">

  <!-- Header -->
  <div id="header">
    <span id="session-title">SESSION PLAYER</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="hr-btn" onclick="connectHR()" style="display:none;">❤️ --</button>
      <span id="total-timer">00:00</span>
    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- READY -->
    <div id="ready-screen">
      <div id="ready-title">TEMPO SESSION</div>
      <div id="ready-sub">4 × 5 min · 3 segments</div>
      <div id="segment-list"></div>
      <button id="start-btn" onclick="startSession()">▶&nbsp;&nbsp;START SESSION</button>
    </div>

    <!-- ACTIVE -->
    <div id="active-screen">
      <div id="seg-counter">SEGMENT 1 OF 6</div>
      <div id="rep-counter"></div>
      <div id="seg-name-big">WARM-UP</div>
      <div id="pace-display">6:14</div>
      <div id="pace-unit">/KM &nbsp;·&nbsp; SET TREADMILL</div>
      <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
        <div id="progress-text">
          <span id="prog-done">0:00 done</span>
          <span id="prog-left">5:00 left</span>
        </div>
      </div>
      <div id="seg-timer">5:00</div>
      <div id="effort-cue">EASY — CONVERSATIONAL</div>
      <button id="next-btn" onclick="advanceSegment()">⏭&nbsp;&nbsp;NEXT SEGMENT</button>
      <div id="mini-controls">
        <button class="mini-btn" id="pause-btn" onclick="togglePause()">⏸&nbsp; PAUSE</button>
        <button class="mini-btn" onclick="restartSession()">↺&nbsp; RESTART</button>
      </div>
    </div>

    <!-- TRANSITION -->
    <div id="trans-screen">
      <div id="trans-label">NEXT UP</div>
      <div id="trans-name"></div>
      <div id="trans-pace"></div>
      <div id="trans-count">3</div>
    </div>

    <!-- DONE -->
    <div id="done-screen">
      <div id="done-tick">✅</div>
      <div id="done-title">SESSION COMPLETE</div>
      <div class="done-stat">
        <div id="done-time" class="done-stat-v">--:--</div>
        <div class="done-stat-l">TOTAL TIME</div>
      </div>
      <div class="done-stat">
        <div id="done-segs" class="done-stat-v">--</div>
        <div class="done-stat-l">SEGMENTS COMPLETED</div>
      </div>
      <div id="done-log">Tap /log in the bot to record your run</div>
    </div>

  </div>

  <!-- Footer -->
  <div id="footer">RUN COACH · TREADMILL MODE</div>

</div>

<script>
'use strict';

// ── Audio ─────────────────────────────────────────────────────────────────
let ac = null;
function initAudio() { if (!ac) ac = new(window.AudioContext || window.webkitAudioContext)(); }

function beep(freq, dur, vol=0.3, type='sine', delay=0) {
  if (!ac) return;
  const t = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}

function chimeStart()    { beep(523,0.12,0.25); beep(784,0.18,0.25,undefined,0.12); }
function chimeWarn()     { beep(440,0.08,0.15); }
function chimeDone()     { [523,659,784,1047].forEach((f,i)=>beep(f,0.15,0.22,'square',i*0.1)); }
function chimeTransition(){ beep(659,0.1,0.2); beep(784,0.15,0.2,undefined,0.12); }

// ── Wake Lock ─────────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// ── Distance → Time conversion table ─────────────────────────────────────
// Standard treadmill conversions by effort type.
// Strides/Reps use sprint times. Intervals use I-pace. Easy/Threshold use pace.
const DIST_TO_SECS = {
  // Strides & short reps — essentially sprinting
  stride: {
    '50m':   6,   '100m': 10,  '150m': 18,
    '200m':  30,  '300m': 55,  '400m': 90,
  },
  // Repetitions (R-pace ~4:30/km)
  rep: {
    '100m': 27,   '200m': 54,   '300m': 81,
    '400m': 108,  '600m': 162,  '800m': 216,
    '1km':  270,  '1200m': 324,
  },
  // Intervals (I-pace ~4:47/km)
  interval: {
    '200m':  58,   '300m':  87,  '400m':  116,
    '600m':  174,  '800m':  232, '1km':   287,
    '1200m': 344,  '1600m': 459, '2km':   574,
  },
  // Threshold (T-pace ~5:12/km)
  threshold: {
    '400m':  125,  '800m':  250,  '1km':  312,
    '1200m': 374,  '1600m': 499,  '2km':  624,
    '3km':   936,  '4km':   1248, '5km':  1560,
  },
  // Easy / warm-up / cool-down / recovery (~6:14/km)
  easy: {
    '400m':  150,  '800m':  299,  '1km':   374,
    '1200m': 449,  '1600m': 598,  '2km':   748,
    '3km':   1122, '4km':   1496, '5km':   1870,
    '6km':   2244, '8km':   2992, '10km':  3740,
    '12km':  4488, '15km':  5610,
  },
};

function distToSecs(distStr, effortType) {
  // Normalise: "2.0 km" → "2km", "400 m" → "400m"
  const s = distStr.toLowerCase().replace(/\s+/g, '').replace('kilometres','km').replace('kilometre','km').replace('meters','m').replace('metre','m');
  const table = DIST_TO_SECS[effortType] || DIST_TO_SECS.easy;

  // Direct lookup
  if (table[s]) return table[s];

  // Parse numeric value and unit
  const match = s.match(/^([\d.]+)(km|m)$/);
  if (!match) return null;
  const val  = parseFloat(match[1]);
  const unit = match[2];
  const metres = unit === 'km' ? val * 1000 : val;

  // Find pace for effort type (seconds per metre)
  const pacePerM = {
    stride:    10/100,   // ~10 sec per 100m
    rep:       270/1000, // ~4:30/km
    interval:  287/1000, // ~4:47/km
    threshold: 312/1000, // ~5:12/km
    easy:      374/1000, // ~6:14/km
  }[effortType] || 374/1000;

  return Math.round(metres * pacePerM);
}

function fmtDuration(secs) {
  // Return human-readable duration for ready screen
  if (secs < 60)  return `${secs}s`;
  if (secs < 3600) return `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
  return `${h}h ${m}m`;
}

// ── Session definition ────────────────────────────────────────────────────
// Each segment: { name, pace, duration (seconds), effort, theme, color, rep?, reps? }
// duration = time in seconds — converted from distance where needed
const SEGMENTS = [
  {
    name: 'Warm-Up',   pace: '6:30',
    duration: distToSecs('2km', 'easy'),
    effort: 'EASY — CONVERSATIONAL', theme: 'easy', color: '#2d8f2d',
  },
  { name: 'Tempo', pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',  theme: 'tempo',   color: '#e8a020', rep: 1, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#2d8f2d', rep: 1, reps: 4 },
  { name: 'Tempo', pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',  theme: 'tempo',   color: '#e8a020', rep: 2, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#2d8f2d', rep: 2, reps: 4 },
  { name: 'Tempo', pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',  theme: 'tempo',   color: '#e8a020', rep: 3, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#2d8f2d', rep: 3, reps: 4 },
  { name: 'Tempo', pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',  theme: 'tempo',   color: '#e8a020', rep: 4, reps: 4 },
  {
    name: 'Cool-Down', pace: '6:30',
    duration: distToSecs('2km', 'easy'),
    effort: 'EASY — FLUSH IT OUT', theme: 'easy', color: '#2d8f2d',
  },
];

const TOTAL_SEG = SEGMENTS.length;

// ── State ─────────────────────────────────────────────────────────────────
let currentSeg  = 0;
let segElapsed  = 0;
let totalElapsed= 0;
let running     = false;
let warnFired   = false;
let ticker      = null;
let transTimer  = null;

// ── Build ready screen ────────────────────────────────────────────────────
function buildReadyScreen() {
  const list = document.getElementById('segment-list');
  const previews = [
    { name: 'Warm-Up',      dur: fmtDuration(SEGMENTS[0].duration), pace: SEGMENTS[0].pace + ' /km', color: '#2d8f2d' },
    { name: '4× Tempo',     dur: fmtDuration(SEGMENTS[1].duration), pace: SEGMENTS[1].pace + ' /km', color: '#e8a020' },
    { name: '3× Recovery',  dur: fmtDuration(SEGMENTS[2].duration), pace: SEGMENTS[2].pace + ' /km', color: '#2d8f2d' },
    { name: 'Cool-Down',    dur: fmtDuration(SEGMENTS[8].duration), pace: SEGMENTS[8].pace + ' /km', color: '#2d8f2d' },
  ];
  previews.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'segment-preview';
    d.style.borderBottomColor = p.color;
    d.innerHTML = `
      <div>
        <div class="seg-num">SEGMENT ${i+1}</div>
        <div class="seg-name">${p.name}</div>
        <div class="seg-pace">${p.pace}</div>
      </div>
      <div class="seg-right">
        <div class="seg-dur">${p.dur}</div>
      </div>`;
    list.appendChild(d);
  });
}

// ── Format helpers ────────────────────────────────────────────────────────
function fmtTime(secs) {
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ── Screen management ─────────────────────────────────────────────────────
function showScreen(name) {
  ['ready-screen','active-screen','trans-screen','done-screen'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
    if (el.style.flexDirection !== undefined) el.style.flexDirection = '';
  });
  const target = document.getElementById(name + '-screen');
  target.style.display = name === 'trans' || name === 'done' ? 'flex' : 'block';
  if (name === 'trans' || name === 'done') target.style.flexDirection = 'column';
  if (name === 'trans') target.style.alignItems = 'center';
}

function setTheme(theme) {
  const app = document.getElementById('app');
  app.className = `theme-${theme}`;
}

// ── Update active display ─────────────────────────────────────────────────
function updateActiveDisplay() {
  const seg = SEGMENTS[currentSeg];
  const remaining = seg.duration - segElapsed;
  const pct = Math.min(100, (segElapsed / seg.duration) * 100);

  // Segment counter
  document.getElementById('seg-counter').textContent =
    `SEGMENT ${currentSeg + 1} OF ${TOTAL_SEG}`;

  // Rep counter (for tempo/recovery intervals)
  const repEl = document.getElementById('rep-counter');
  if (seg.rep && seg.reps) {
    repEl.textContent = `REP ${seg.rep} OF ${seg.reps}`;
    repEl.style.display = 'block';
  } else {
    repEl.style.display = 'none';
  }

  document.getElementById('seg-name-big').textContent = seg.name.toUpperCase();
  document.getElementById('pace-display').textContent = seg.pace;
  document.getElementById('seg-timer').textContent = fmtTime(remaining);
  document.getElementById('effort-cue').textContent = seg.effort;

  // Progress bar
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-done').textContent = fmtTime(segElapsed) + ' done';
  document.getElementById('prog-left').textContent = fmtTime(remaining) + ' left';

  // Total timer
  document.getElementById('total-timer').textContent = fmtTime(totalElapsed);

  // Next button label
  const nextEl = document.getElementById('next-btn');
  if (currentSeg === TOTAL_SEG - 1) {
    nextEl.textContent = '✅  FINISH SESSION';
  } else {
    const next = SEGMENTS[currentSeg + 1];
    nextEl.textContent = `⏭  ${next.name.toUpperCase()}`;
  }
}

// ── Ticker ────────────────────────────────────────────────────────────────
function tick() {
  segElapsed++;
  totalElapsed++;
  const seg = SEGMENTS[currentSeg];
  const remaining = seg.duration - segElapsed;

  // 30 second warning
  if (remaining === 30 && !warnFired) {
    warnFired = true;
    chimeWarn();
  }

  // Auto-advance when segment ends
  if (remaining <= 0) {
    if (currentSeg < TOTAL_SEG - 1) {
      startTransition();
    } else {
      finishSession();
    }
    return;
  }

  updateActiveDisplay();
}

// ── Heart Rate Monitor (Web Bluetooth) ───────────────────────────────────
let hrDevice = null;
let hrConnected = false;

function initHR() {
  // Show button only if Web Bluetooth is available
  if (navigator.bluetooth) {
    document.getElementById('hr-btn').style.display = 'block';
  }
}

async function connectHR() {
  const btn = document.getElementById('hr-btn');

  // If already connected — disconnect
  if (hrConnected && hrDevice) {
    try { hrDevice.gatt.disconnect(); } catch(e) {}
    hrDevice = null;
    hrConnected = false;
    btn.textContent = '❤️ --';
    btn.classList.remove('connected');
    return;
  }

  try {
    btn.textContent = '❤️ …';

    hrDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['heart_rate'] }]
    });

    hrDevice.addEventListener('gattserverdisconnected', () => {
      hrConnected = false;
      btn.textContent = '❤️ --';
      btn.classList.remove('connected');
    });

    const server  = await hrDevice.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    const char    = await service.getCharacteristic('heart_rate_measurement');

    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', e => {
      // Heart rate value is in byte 1 (byte 0 is flags)
      const bpm = e.target.value.getUint8(1);
      btn.textContent = `❤️ ${bpm}`;
      btn.classList.add('connected');
      hrConnected = true;
    });

  } catch(e) {
    // User cancelled or device not found — reset silently
    btn.textContent = '❤️ --';
    btn.classList.remove('connected');
    hrDevice = null;
    hrConnected = false;
  }
}

// ── Pause / Resume ────────────────────────────────────────────────────────
let paused = false;

function togglePause() {
  initAudio();
  const btn = document.getElementById('pause-btn');
  if (paused) {
    // Resume
    paused = false;
    btn.textContent = '⏸\xa0 PAUSE';
    ticker = setInterval(tick, 1000);
    beep(523, 0.08, 0.15);
  } else {
    // Pause
    paused = true;
    btn.textContent = '▶\xa0 RESUME';
    clearInterval(ticker);
    beep(330, 0.08, 0.15);
  }
}

// ── Restart session ───────────────────────────────────────────────────────
let restartPending = false;

function restartSession() {
  const btn = document.querySelector('[onclick="restartSession()"]');
  if (!restartPending) {
    // First tap — ask for confirmation by changing button text
    restartPending = true;
    btn.textContent = '↺ CONFIRM';
    btn.style.color = 'rgba(255,100,100,0.8)';
    // Auto-cancel after 3 seconds
    setTimeout(() => {
      if (restartPending) {
        restartPending = false;
        btn.textContent = '↺\xa0 RESTART';
        btn.style.color = '';
      }
    }, 3000);
    return;
  }
  // Second tap — confirmed
  restartPending = false;
  btn.textContent = '↺\xa0 RESTART';
  btn.style.color = '';
  clearInterval(ticker);
  clearInterval(transTimer);
  paused = false;
  document.getElementById('pause-btn').textContent = '⏸\xa0 PAUSE';
  startSession();
}

// ── Start session ─────────────────────────────────────────────────────────
function startSession() {
  initAudio();
  requestWakeLock();
  currentSeg   = 0;
  segElapsed   = 0;
  totalElapsed = 0;
  warnFired    = false;
  paused       = false;
  running      = true;
  document.getElementById('pause-btn').textContent = '⏸\xa0 PAUSE';

  showScreen('active');
  setTheme(SEGMENTS[0].theme);
  updateActiveDisplay();
  chimeStart();

  ticker = setInterval(tick, 1000);
}

// ── Transition between segments ───────────────────────────────────────────
function startTransition() {
  clearInterval(ticker);
  running = false;

  const nextSeg = SEGMENTS[currentSeg + 1];
  showScreen('trans');
  setTheme('trans');
  chimeTransition();

  document.getElementById('trans-name').textContent = nextSeg.name.toUpperCase();
  document.getElementById('trans-pace').textContent = nextSeg.pace + ' /km';

  let count = 3;
  document.getElementById('trans-count').textContent = count;

  transTimer = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(transTimer);
      moveToNextSegment();
    } else {
      document.getElementById('trans-count').textContent = count;
    }
  }, 1000);
}

function moveToNextSegment() {
  currentSeg++;
  segElapsed = 0;
  warnFired  = false;
  running    = true;

  showScreen('active');
  setTheme(SEGMENTS[currentSeg].theme);
  updateActiveDisplay();
  chimeStart();

  ticker = setInterval(tick, 1000);
}

// ── Manual advance ────────────────────────────────────────────────────────
function advanceSegment() {
  initAudio();
  clearInterval(ticker);
  clearInterval(transTimer);

  if (currentSeg >= TOTAL_SEG - 1) {
    finishSession();
    return;
  }
  startTransition();
}

// ── Finish ────────────────────────────────────────────────────────────────
function finishSession() {
  clearInterval(ticker);
  clearInterval(transTimer);
  running = false;
  releaseWakeLock();

  showScreen('done');
  setTheme('done');
  chimeDone();

  document.getElementById('done-time').textContent = fmtTime(totalElapsed);
  document.getElementById('done-segs').textContent = `${currentSeg + 1} / ${TOTAL_SEG}`;

  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify({
      action: 'session_complete',
      duration_seconds: totalElapsed,
      segments_done: currentSeg + 1,
    }));
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
buildReadyScreen();
showScreen('ready');
initHR();

// Telegram SDK
const tg = document.createElement('script');
tg.src = 'https://telegram.org/js/telegram-web-app.js';
tg.onload = () => { if (window.Telegram) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); } };
document.head.appendChild(tg);
</script>
