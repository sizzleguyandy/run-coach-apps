<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Session Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: 'Courier New', monospace;
  background: #0d0d1a;
  color: #fff;
  overflow: hidden;
  user-select: none;
}

#app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.5s ease;
}

/* ── Colour themes — each sets --accent for child elements ── */
.theme-ready    { background: #0d0d1a;  --accent: #ffffff; }
.theme-warmup   { background: #071428;  --accent: #5599ff; }
.theme-easy     { background: #071a07;  --accent: #44cc55; }
.theme-recover  { background: #071a07;  --accent: #44cc55; }
.theme-tempo    { background: #1f1200;  --accent: #ff9922; }
.theme-interval { background: #1f1200;  --accent: #ff9922; }
.theme-hard     { background: #1f0505;  --accent: #ff3333; }
.theme-trans    { background: #0f0f1f;  --accent: #aaaacc; }
.theme-done     { background: #071a07;  --accent: #44cc55; }

/* ── Header bar ── */
#header {
  padding: 16px 20px 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
#session-title { font-size: 13px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
#total-timer   { font-size: 13px; opacity: 0.5; font-variant-numeric: tabular-nums; }

#hr-btn {
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
#hr-btn.connected { color: #ff4455; border-color: rgba(255,60,70,0.4); background: rgba(255,60,70,0.1); }

/* ── HR Display — large, centred, top of active screen ── */
#hr-display {
  display: none;
  flex-shrink: 0;
  text-align: center;
  padding: 6px 0 2px;
  align-items: baseline;
  justify-content: center;
  gap: 6px;
}
#hr-display.visible { display: flex; }
#hr-heart { font-size: 22px; color: #ff4455; line-height: 1; }
#hr-bpm   {
  font-size: 64px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  color: #ff4455;
  line-height: 1;
}
#hr-unit  { font-size: 14px; opacity: 0.5; letter-spacing: 1px; align-self: flex-end; padding-bottom: 8px; }

/* ── Main content ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  text-align: center;
  overflow: hidden;
}

/* ── Ready screen ── */
#ready-screen { width: 100%; }
#ready-title  { font-size: 26px; font-weight: bold; margin-bottom: 6px; letter-spacing: 1px; }
#ready-sub    { font-size: 13px; opacity: 0.5; margin-bottom: 32px; }

.segment-preview {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  margin-bottom: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border-bottom: 3px solid;
  text-align: left;
}
.seg-num  { font-size: 11px; opacity: 0.4; margin-bottom: 2px; }
.seg-name { font-size: 15px; font-weight: bold; }
.seg-pace { font-size: 12px; opacity: 0.6; margin-top: 2px; }
.seg-right { text-align: right; }
.seg-dur  { font-size: 20px; font-weight: bold; }
.seg-unit { font-size: 11px; opacity: 0.5; }

#start-btn {
  margin-top: 32px;
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 14px;
  background: #e63946;
  color: #fff;
  font-size: 17px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
#start-btn:active { transform: scale(0.97); opacity: 0.85; }

/* ── Active screen ── */
#active-screen { width: 100%; display: none; }

#seg-counter {
  font-size: 12px;
  opacity: 0.45;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
#rep-counter {
  font-size: 13px;
  opacity: 0.6;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

/* Segment name — uses theme accent colour */
#seg-name-big {
  font-size: 30px;
  font-weight: bold;
  letter-spacing: 3px;
  margin-bottom: 16px;
  text-transform: uppercase;
  color: var(--accent, #ffffff);
  transition: color 0.5s ease;
}

#pace-display {
  font-size: 72px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 4px;
}
#pace-unit {
  font-size: 13px;
  opacity: 0.5;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* Progress bar — fill uses theme accent colour */
#progress-wrap {
  width: 100%;
  margin-bottom: 8px;
}
#progress-bar-bg {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent, rgba(255,255,255,0.7));
  transition: width 0.5s linear, background 0.5s ease;
  width: 0%;
}
#progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.45;
  margin-top: 5px;
}

/* Segment timer — large, accent coloured */
#seg-timer {
  font-size: 88px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin: 14px 0 6px;
  color: var(--accent, #ffffff);
  transition: color 0.5s ease;
}

#effort-cue {
  font-size: 12px;
  opacity: 0.55;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 24px;
}

/* Next button — accent border */
#next-btn {
  width: 100%;
  padding: 15px;
  border: 2px solid var(--accent, rgba(255,255,255,0.3));
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 15px;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.5s ease;
}
#next-btn:active { background: rgba(255,255,255,0.15); }

/* Mini controls */
#mini-controls {
  display: flex;
  gap: 20px;
  margin-top: 8px;
  width: 100%;
  justify-content: center;
}
.mini-btn {
  padding: 6px 14px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-size: 11px;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  cursor: pointer;
  transition: color 0.15s;
}
.mini-btn:active { color: rgba(255,255,255,0.75); }

/* ── Transition screen ── */
#trans-screen {
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
}
#trans-label   { font-size: 13px; opacity: 0.5; letter-spacing: 3px; margin-bottom: 16px; }
#trans-name    { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
#trans-pace    { font-size: 18px; opacity: 0.7; margin-bottom: 32px; }
#trans-count   { font-size: 80px; font-weight: bold; font-variant-numeric: tabular-nums; }

/* ── Done screen ── */
#done-screen {
  width: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
}
#done-tick    { font-size: 56px; margin-bottom: 16px; }
#done-title   { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin-bottom: 32px; }
.done-stat    { margin-bottom: 16px; }
.done-stat-v  { font-size: 40px; font-weight: bold; font-variant-numeric: tabular-nums; }
.done-stat-l  { font-size: 12px; opacity: 0.5; letter-spacing: 2px; margin-top: 2px; }
#done-log     {
  margin-top: 32px;
  padding: 14px 28px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
  opacity: 0.7;
  letter-spacing: 1px;
}

/* ── Bottom footer ── */
#footer {
  padding: 12px 20px 20px;
  text-align: center;
  flex-shrink: 0;
  font-size: 11px;
  opacity: 0.25;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="app" class="theme-ready">

  <!-- Header -->
  <div id="header">
    <span id="session-title">SESSION PLAYER</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="hr-btn" onclick="connectHR()" style="display:none;">♥ CONNECT HR</button>
      <span id="total-timer">00:00</span>
    </div>
  </div>

  <!-- HR Display (large, centred — shown when HR connected) -->
  <div id="hr-display">
    <span id="hr-heart">♥</span>
    <span id="hr-bpm">--</span>
    <span id="hr-unit">BPM</span>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- READY -->
    <div id="ready-screen">
      <div id="ready-title">TEMPO SESSION</div>
      <div id="ready-sub">4 × 5 min · 3 segments</div>
      <div id="segment-list"></div>
      <button id="start-btn" onclick="startSession()">▶&nbsp;&nbsp;START SESSION</button>
    </div>

    <!-- ACTIVE -->
    <div id="active-screen">
      <div id="seg-counter">SEGMENT 1 OF 6</div>
      <div id="rep-counter"></div>
      <div id="seg-name-big">WARM-UP</div>
      <div id="pace-display">6:14</div>
      <div id="pace-unit">/KM &nbsp;·&nbsp; SET TREADMILL</div>
      <div id="progress-wrap">
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
        <div id="progress-text">
          <span id="prog-done">0:00 done</span>
          <span id="prog-left">5:00 left</span>
        </div>
      </div>
      <div id="seg-timer">5:00</div>
      <div id="effort-cue">EASY — CONVERSATIONAL</div>
      <button id="next-btn" onclick="advanceSegment()">⏭&nbsp;&nbsp;NEXT SEGMENT</button>
      <div id="mini-controls">
        <button class="mini-btn" id="pause-btn" onclick="togglePause()">⏸&nbsp; PAUSE</button>
        <button class="mini-btn" onclick="restartSession()">↺&nbsp; RESTART</button>
      </div>
    </div>

    <!-- TRANSITION -->
    <div id="trans-screen">
      <div id="trans-label">NEXT UP</div>
      <div id="trans-name"></div>
      <div id="trans-pace"></div>
      <div id="trans-count">3</div>
    </div>

    <!-- DONE -->
    <div id="done-screen">
      <div id="done-tick">✅</div>
      <div id="done-title">SESSION COMPLETE</div>
      <div class="done-stat">
        <div id="done-time" class="done-stat-v">--:--</div>
        <div class="done-stat-l">TOTAL TIME</div>
      </div>
      <div class="done-stat">
        <div id="done-segs" class="done-stat-v">--</div>
        <div class="done-stat-l">SEGMENTS COMPLETED</div>
      </div>
      <div id="done-log">Tap /log in the bot to record your run</div>
    </div>

  </div>

  <!-- Footer -->
  <div id="footer">RUN COACH · TREADMILL MODE</div>

</div>

<script>
'use strict';

// ── Audio ─────────────────────────────────────────────────────────────────
let ac = null;
function initAudio() { if (!ac) ac = new(window.AudioContext || window.webkitAudioContext)(); }

function beep(freq, dur, vol=0.3, type='sine', delay=0) {
  if (!ac) return;
  const t = ac.currentTime + delay;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}

function chimeStart()    { beep(523,0.12,0.25); beep(784,0.18,0.25,undefined,0.12); }
function chimeWarn()     { beep(440,0.08,0.15); }
function chimeDone()     { [523,659,784,1047].forEach((f,i)=>beep(f,0.15,0.22,'square',i*0.1)); }
function chimeTransition(){ beep(659,0.1,0.2); beep(784,0.15,0.2,undefined,0.12); }

// ── Wake Lock ─────────────────────────────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
async function releaseWakeLock() {
  if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// ── Distance → Time conversion table ─────────────────────────────────────
const DIST_TO_SECS = {
  stride: {
    '50m':   6,   '100m': 10,  '150m': 18,
    '200m':  30,  '300m': 55,  '400m': 90,
  },
  rep: {
    '100m': 27,   '200m': 54,   '300m': 81,
    '400m': 108,  '600m': 162,  '800m': 216,
    '1km':  270,  '1200m': 324,
  },
  interval: {
    '200m':  58,   '300m':  87,  '400m':  116,
    '600m':  174,  '800m':  232, '1km':   287,
    '1200m': 344,  '1600m': 459, '2km':   574,
  },
  threshold: {
    '400m':  125,  '800m':  250,  '1km':  312,
    '1200m': 374,  '1600m': 499,  '2km':  624,
    '3km':   936,  '4km':   1248, '5km':  1560,
  },
  easy: {
    '400m':  150,  '800m':  299,  '1km':   374,
    '1200m': 449,  '1600m': 598,  '2km':   748,
    '3km':   1122, '4km':   1496, '5km':   1870,
    '6km':   2244, '8km':   2992, '10km':  3740,
    '12km':  4488, '15km':  5610,
  },
};

function distToSecs(distStr, effortType) {
  const s = distStr.toLowerCase().replace(/\s+/g, '').replace('kilometres','km').replace('kilometre','km').replace('meters','m').replace('metre','m');
  const table = DIST_TO_SECS[effortType] || DIST_TO_SECS.easy;
  if (table[s]) return table[s];
  const match = s.match(/^([\d.]+)(km|m)$/);
  if (!match) return null;
  const val  = parseFloat(match[1]);
  const unit = match[2];
  const metres = unit === 'km' ? val * 1000 : val;
  const pacePerM = {
    stride:    10/100,
    rep:       270/1000,
    interval:  287/1000,
    threshold: 312/1000,
    easy:      374/1000,
  }[effortType] || 374/1000;
  return Math.round(metres * pacePerM);
}

function fmtDuration(secs) {
  if (secs < 60)   return `${secs}s`;
  if (secs < 3600) return `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
  return `${h}h ${m}m`;
}

// ── Session definition ────────────────────────────────────────────────────
// theme → background class;  colour → ready-screen preview border + accent reference
// warmup=blue, easy/recover=green, tempo/interval=orange, hard/reps/strides=red
const SEGMENTS = [
  {
    name: 'Warm-Up',  pace: '6:30',
    duration: distToSecs('2km', 'easy'),
    effort: 'EASY — CONVERSATIONAL',
    theme: 'warmup',  color: '#5599ff',   // blue
  },
  { name: 'Tempo',    pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',   theme: 'tempo',   color: '#ff9922', rep: 1, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#44cc55', rep: 1, reps: 4 },
  { name: 'Tempo',    pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',   theme: 'tempo',   color: '#ff9922', rep: 2, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#44cc55', rep: 2, reps: 4 },
  { name: 'Tempo',    pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',   theme: 'tempo',   color: '#ff9922', rep: 3, reps: 4 },
  { name: 'Recovery', pace: '6:30', duration: distToSecs('400m','easy'), effort: 'EASY — RECOVER', theme: 'recover', color: '#44cc55', rep: 3, reps: 4 },
  { name: 'Tempo',    pace: '5:12', duration: 5*60, effort: 'COMFORTABLY HARD',   theme: 'tempo',   color: '#ff9922', rep: 4, reps: 4 },
  {
    name: 'Cool-Down', pace: '6:30',
    duration: distToSecs('2km', 'easy'),
    effort: 'EASY — FLUSH IT OUT',
    theme: 'easy',   color: '#44cc55',   // green
  },
];

const TOTAL_SEG = SEGMENTS.length;

// ── State ─────────────────────────────────────────────────────────────────
let currentSeg   = 0;
let segElapsed   = 0;
let totalElapsed = 0;
let running      = false;
let warnFired    = false;
let ticker       = null;
let transTimer   = null;

// ── Build ready screen ────────────────────────────────────────────────────
function buildReadyScreen() {
  const list = document.getElementById('segment-list');
  const previews = [
    { name: 'Warm-Up',     dur: fmtDuration(SEGMENTS[0].duration), pace: SEGMENTS[0].pace + ' /km', color: '#5599ff' },
    { name: '4× Tempo',    dur: fmtDuration(SEGMENTS[1].duration), pace: SEGMENTS[1].pace + ' /km', color: '#ff9922' },
    { name: '3× Recovery', dur: fmtDuration(SEGMENTS[2].duration), pace: SEGMENTS[2].pace + ' /km', color: '#44cc55' },
    { name: 'Cool-Down',   dur: fmtDuration(SEGMENTS[8].duration), pace: SEGMENTS[8].pace + ' /km', color: '#44cc55' },
  ];
  previews.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'segment-preview';
    d.style.borderBottomColor = p.color;
    d.innerHTML = `
      <div>
        <div class="seg-num">SEGMENT ${i+1}</div>
        <div class="seg-name" style="color:${p.color}">${p.name}</div>
        <div class="seg-pace">${p.pace}</div>
      </div>
      <div class="seg-right">
        <div class="seg-dur">${p.dur}</div>
      </div>`;
    list.appendChild(d);
  });
}

// ── Format helpers ────────────────────────────────────────────────────────
function fmtTime(secs) {
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ── Screen management ─────────────────────────────────────────────────────
function showScreen(name) {
  ['ready-screen','active-screen','trans-screen','done-screen'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
    if (el.style.flexDirection !== undefined) el.style.flexDirection = '';
  });
  const target = document.getElementById(name + '-screen');
  target.style.display = name === 'trans' || name === 'done' ? 'flex' : 'block';
  if (name === 'trans' || name === 'done') target.style.flexDirection = 'column';
  if (name === 'trans') target.style.alignItems = 'center';
}

function setTheme(theme) {
  document.getElementById('app').className = `theme-${theme}`;
}

// ── Update active display ─────────────────────────────────────────────────
function updateActiveDisplay() {
  const seg = SEGMENTS[currentSeg];
  const remaining = seg.duration - segElapsed;
  const pct = Math.min(100, (segElapsed / seg.duration) * 100);

  document.getElementById('seg-counter').textContent =
    `SEGMENT ${currentSeg + 1} OF ${TOTAL_SEG}`;

  const repEl = document.getElementById('rep-counter');
  if (seg.rep && seg.reps) {
    repEl.textContent = `REP ${seg.rep} OF ${seg.reps}`;
    repEl.style.display = 'block';
  } else {
    repEl.style.display = 'none';
  }

  document.getElementById('seg-name-big').textContent = seg.name.toUpperCase();
  document.getElementById('pace-display').textContent  = seg.pace;
  document.getElementById('seg-timer').textContent     = fmtTime(remaining);
  document.getElementById('effort-cue').textContent    = seg.effort;

  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-done').textContent = fmtTime(segElapsed) + ' done';
  document.getElementById('prog-left').textContent = fmtTime(remaining) + ' left';

  document.getElementById('total-timer').textContent = fmtTime(totalElapsed);

  const nextEl = document.getElementById('next-btn');
  if (currentSeg === TOTAL_SEG - 1) {
    nextEl.textContent = '✅  FINISH SESSION';
  } else {
    const next = SEGMENTS[currentSeg + 1];
    nextEl.textContent = `⏭  ${next.name.toUpperCase()}`;
  }
}

// ── Ticker ────────────────────────────────────────────────────────────────
function tick() {
  segElapsed++;
  totalElapsed++;
  const seg = SEGMENTS[currentSeg];
  const remaining = seg.duration - segElapsed;

  if (remaining === 30 && !warnFired) {
    warnFired = true;
    chimeWarn();
  }

  if (remaining <= 0) {
    if (currentSeg < TOTAL_SEG - 1) {
      startTransition();
    } else {
      finishSession();
    }
    return;
  }

  updateActiveDisplay();
}

// ── Heart Rate Monitor (Web Bluetooth) ───────────────────────────────────
let hrDevice    = null;
let hrChar      = null;   // keep reference for reconnect
let hrConnected = false;

function initHR() {
  if (navigator.bluetooth) {
    document.getElementById('hr-btn').style.display = 'block';
  }
}

// Parse HR value correctly per Bluetooth spec:
// Bit 0 of flags byte: 0 = Uint8 BPM, 1 = Uint16 BPM
function parseHRValue(dataView) {
  const flags = dataView.getUint8(0);
  return (flags & 0x01) ? dataView.getUint16(1, true) : dataView.getUint8(1);
}

function updateHRDisplay(bpm) {
  const displayEl = document.getElementById('hr-display');
  const bpmEl     = document.getElementById('hr-bpm');
  const btn       = document.getElementById('hr-btn');

  bpmEl.textContent = bpm;
  btn.textContent   = `♥ ${bpm}`;
  btn.classList.add('connected');
  hrConnected = true;

  // Show large HR display
  displayEl.classList.add('visible');
}

function clearHRDisplay() {
  const btn = document.getElementById('hr-btn');
  btn.textContent = '♥ CONNECT HR';
  btn.classList.remove('connected');
  document.getElementById('hr-display').classList.remove('visible');
  document.getElementById('hr-bpm').textContent = '--';
  hrConnected = false;
}

function handleHRChange(e) {
  try {
    const bpm = parseHRValue(e.target.value);
    if (bpm > 0) updateHRDisplay(bpm);
  } catch(err) {
    // Ignore malformed packets
  }
}

// Attempt to reconnect after GATT disconnects (device went to sleep, etc.)
async function reconnectHR() {
  if (!hrDevice) return;
  // Wait a moment before attempting reconnect
  await new Promise(r => setTimeout(r, 1500));
  try {
    const server  = await hrDevice.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    hrChar        = await service.getCharacteristic('heart_rate_measurement');
    await hrChar.startNotifications();
    hrChar.addEventListener('characteristicvaluechanged', handleHRChange);
  } catch(e) {
    clearHRDisplay();
    hrDevice = null;
    hrChar   = null;
  }
}

async function connectHR() {
  const btn = document.getElementById('hr-btn');

  if (hrConnected && hrDevice) {
    // Disconnect
    try { hrDevice.gatt.disconnect(); } catch(e) {}
    hrDevice = null;
    hrChar   = null;
    clearHRDisplay();
    return;
  }

  try {
    btn.textContent = '♥ …';

    hrDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['heart_rate'] }]
    });

    hrDevice.addEventListener('gattserverdisconnected', () => {
      clearHRDisplay();
      // Auto-reconnect — device may have briefly lost connection
      reconnectHR();
    });

    const server  = await hrDevice.gatt.connect();
    const service = await server.getPrimaryService('heart_rate');
    hrChar        = await service.getCharacteristic('heart_rate_measurement');

    await hrChar.startNotifications();
    hrChar.addEventListener('characteristicvaluechanged', handleHRChange);

  } catch(e) {
    clearHRDisplay();
    hrDevice = null;
    hrChar   = null;
  }
}

// ── Pause / Resume ────────────────────────────────────────────────────────
let paused = false;

function togglePause() {
  initAudio();
  const btn = document.getElementById('pause-btn');
  if (paused) {
    paused = false;
    btn.textContent = '⏸\xa0 PAUSE';
    ticker = setInterval(tick, 1000);
    beep(523, 0.08, 0.15);
  } else {
    paused = true;
    btn.textContent = '▶\xa0 RESUME';
    clearInterval(ticker);
    beep(330, 0.08, 0.15);
  }
}

// ── Restart session ───────────────────────────────────────────────────────
let restartPending = false;

function restartSession() {
  const btn = document.querySelector('[onclick="restartSession()"]');
  if (!restartPending) {
    restartPending = true;
    btn.textContent = '↺ CONFIRM';
    btn.style.color = 'rgba(255,100,100,0.8)';
    setTimeout(() => {
      if (restartPending) {
        restartPending = false;
        btn.textContent = '↺\xa0 RESTART';
        btn.style.color = '';
      }
    }, 3000);
    return;
  }
  restartPending = false;
  btn.textContent = '↺\xa0 RESTART';
  btn.style.color = '';
  clearInterval(ticker);
  clearInterval(transTimer);
  paused = false;
  document.getElementById('pause-btn').textContent = '⏸\xa0 PAUSE';
  startSession();
}

// ── Start session ─────────────────────────────────────────────────────────
function startSession() {
  initAudio();
  requestWakeLock();
  currentSeg   = 0;
  segElapsed   = 0;
  totalElapsed = 0;
  warnFired    = false;
  paused       = false;
  running      = true;
  document.getElementById('pause-btn').textContent = '⏸\xa0 PAUSE';

  showScreen('active');
  setTheme(SEGMENTS[0].theme);
  updateActiveDisplay();
  chimeStart();

  ticker = setInterval(tick, 1000);
}

// ── Transition between segments ───────────────────────────────────────────
function startTransition() {
  clearInterval(ticker);
  running = false;

  const nextSeg = SEGMENTS[currentSeg + 1];
  showScreen('trans');
  setTheme('trans');
  chimeTransition();

  document.getElementById('trans-name').textContent = nextSeg.name.toUpperCase();
  document.getElementById('trans-pace').textContent = nextSeg.pace + ' /km';

  let count = 3;
  document.getElementById('trans-count').textContent = count;

  transTimer = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(transTimer);
      moveToNextSegment();
    } else {
      document.getElementById('trans-count').textContent = count;
    }
  }, 1000);
}

function moveToNextSegment() {
  currentSeg++;
  segElapsed = 0;
  warnFired  = false;
  running    = true;

  showScreen('active');
  setTheme(SEGMENTS[currentSeg].theme);
  updateActiveDisplay();
  chimeStart();

  ticker = setInterval(tick, 1000);
}

// ── Manual advance ────────────────────────────────────────────────────────
function advanceSegment() {
  initAudio();
  clearInterval(ticker);
  clearInterval(transTimer);
  if (currentSeg >= TOTAL_SEG - 1) {
    finishSession();
    return;
  }
  startTransition();
}

// ── Finish ────────────────────────────────────────────────────────────────
function finishSession() {
  clearInterval(ticker);
  clearInterval(transTimer);
  running = false;
  releaseWakeLock();

  showScreen('done');
  setTheme('done');
  chimeDone();

  document.getElementById('done-time').textContent = fmtTime(totalElapsed);
  document.getElementById('done-segs').textContent = `${currentSeg + 1} / ${TOTAL_SEG}`;

  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify({
      action: 'session_complete',
      duration_seconds: totalElapsed,
      segments_done: currentSeg + 1,
    }));
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
buildReadyScreen();
showScreen('ready');
initHR();

const tg = document.createElement('script');
tg.src = 'https://telegram.org/js/telegram-web-app.js';
tg.onload = () => { if (window.Telegram) { Telegram.WebApp.ready(); Telegram.WebApp.expand(); } };
document.head.appendChild(tg);
</script>
